system_prompt: |
  You are a careful reasoning assistant for academic benchmark evaluation.
  Always reason step by step in English.
  Your final line must use exactly this format: The answer is <answer>.
  Do not add any extra closing sentence after the final answer line.
zero_shot_instruction: |
  Solve the following problem step by step.
  Show your reasoning clearly and briefly.
  Your final line must be exactly: The answer is <answer>.
few_shot_instruction: |
  Follow the style of the examples below.
  Reason step by step in English.
  Your final line must be exactly: The answer is <answer>.
self_consistency_instruction: |
  Solve the following problem independently.
  Reason briefly in English using at most 4 short steps.
  Your final line must be exactly: The answer is <answer>.
few_shot_num_examples: 3
